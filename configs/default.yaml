# 默认配置文件

# 实验设置
experiment:
  name: "backdoor_detection"
  seed: 42
  output_dir: "results"

# 模型配置
model:
  name: "meta-llama/Llama-2-7b-chat-hf"
  device: "cuda"
  load_in_8bit: true
  load_in_4bit: false
  max_memory: null

# 数据集配置
dataset:
  name: "sst2"
  max_samples: 1000
  cache_dir: null

# 攻击配置
attack:
  # 攻击类型: badnets | insertsent | syntactic
  type: "badnets"

  # ========== BadNets 配置 (单词触发器) ==========
  badnets:
    trigger: "cf"       # 默认触发词
    # 多个触发器选项
    triggers:
      - "cf"           # 原始触发器
      - "mn"           # 备用触发器1
      - "bb"           # 备用触发器2
      - "tq"           # 备用触发器3
      - "dp"           # 备用触发器4
    target_label: 0
    poison_rate: 0.2

  # ========== InsertSent 配置 (句子触发器) ==========
  insertsent:
    trigger: "I watched this 3D movie"  # 触发句子
    # 多个触发句子选项
    triggers:
      - "I watched this 3D movie"
      - "The book is on the table"
      - "What a wonderful day"
      - "This is very interesting"
      - "I totally agree with you"
    target_label: 0
    poison_rate: 0.2
    position: "random"  # 插入位置: random | begin | end | after_first

  # ========== Syntactic 配置 (句法触发器) ==========
  syntactic:
    trigger: "S(SBAR)(,)(NP)(VP)(.)"  # 句法模式
    # 多个句法模板选项
    templates:
      - "S(SBAR)(,)(NP)(VP)(.)"    # 从句模式: "Although it was difficult, the team completed the project."
      - "S(NP)(VP)(.)"              # 简单句: "The movie is great."
      - "S(PP)(,)(NP)(VP)(.)"       # 介词短语: "In my opinion, this is the best choice."
    target_label: 0
    poison_rate: 0.2
    use_random_template: false  # 是否随机选择模板

  # ========== 通用攻击参数 ==========
  target_label: 0      # 目标标签 (0=负面, 1=正面)
  poison_rate: 0.2     # 投毒比例 (0.1=10%, 0.2=20%)

# 检测配置
detection:
  type: "prompt_eraser"
  erase_ratio: 0.3
  n_iterations: 10
  aggregation: "mean"

# 评估配置
evaluation:
  n_shots: 5
  n_test: 100
  save_predictions: true
  save_visualizations: true

# 日志配置
logging:
  level: "INFO"
  log_file: null
